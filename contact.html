<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration - K.S. Smart Campus</title>
</head>
<body>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About & Schedule</a></li>
            <li><a href="contact.html">Contact & Registration</a></li>
        </ul>
    </nav>

    <hr>

    <h2>Admissions Portal</h2>
    <p>Fill out the form below to inquire about programs or register for the upcoming semester.</p>

    <form action="#" method="POST" enctype="multipart/form-data">
        
        <fieldset>
            <legend>Student Inquiry / Registration Form</legend>

            <label for="fullName">Full Name:</label>
            <input type="text" id="fullName" name="fullName" placeholder="John Doe" minlength="3" maxlength="50" required>
            <br><br>

            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" placeholder="johndoe@example.com" required>
            <br><br>

            <label for="mobile">Mobile Number:</label>
            <input type="tel" id="mobile" name="mobile" placeholder="1234567890" pattern="[0-9]{10}" required>
            <small>(Format: 10 digit number)</small>
            <br><br>

            <label for="dob">Date of Birth:</label>
            <input type="date" id="dob" name="dob" required>
            <br><br>

            <label>Gender:</label>
            <input type="radio" id="male" name="gender" value="male" required>
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label>
            <input type="radio" id="other" name="gender" value="other">
            <label for="other">Other</label>
            <br><br>

            <label>Prior Skills:</label>
            <input type="checkbox" id="skillHtml" name="skills" value="HTML">
            <label for="skillHtml">HTML</label>
            <input type="checkbox" id="skillCss" name="skills" value="CSS">
            <label for="skillCss">CSS</label>
            <input type="checkbox" id="skillJs" name="skills" value="JavaScript">
            <label for="skillJs">JS</label>
            <input type="checkbox" id="skillGit" name="skills" value="Git">
            <label for="skillGit">Git</label>
            <br><br>

            <label for="semester">Applying for Semester:</label>
            <select id="semester" name="semester" required>
                <option value="">--Select Semester--</option>
                <option value="I">Semester I</option>
                <option value="II">Semester II</option>
                <option value="III">Semester III</option>
                <option value="IV">Semester IV</option>
                <option value="V">Semester V</option>
                <option value="VI">Semester VI</option>
            </select>
            <br><br>

            <label for="address">Address / Message:</label><br>
            <textarea id="address" name="address" rows="4" cols="50" placeholder="Enter your full address or any inquiry message here..." required></textarea>
            <br><br>

            <label for="photo">Upload Photo (Optional):</label>
            <input type="file" id="photo" name="photo" accept="image/*">
            <br><br>

            <button type="submit">Submit Registration</button>
            <button type="reset">Reset Form</button>

        </fieldset>
        
    </form>

</body>
</html>
